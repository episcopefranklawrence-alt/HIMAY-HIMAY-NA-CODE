<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDUGRAM — Instructor Dashboard Hub</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="date.css" />
</head>
<body>

  <div class="panel active" id="t-overview">
    <div class="panel-content">
      
      <div class="welcome-banner teacher-banner">
        <div class="welcome-text">
          <h2>Welcome, <span id="teacher-welcome-name">Prof. Juan</span> 📚</h2>
          <p>You have <strong id="t-pending-count">3</strong> submissions awaiting review.</p>
        </div>
        <div class="welcome-art">
          <svg width="120" height="80" viewBox="0 0 120 80">
            <ellipse cx="60" cy="70" rx="55" ry="8" fill="#1a3a5c" opacity="0.1"/>
            <rect x="20" y="20" width="80" height="50" rx="4" fill="#1a3a5c"/>
            <rect x="25" y="25" width="70" height="40" rx="2" fill="#f0f4f8"/>
            <circle cx="75" cy="35" r="10" fill="#c9a84c"/>
            <path d="M70 35l3 3 5-5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
            <rect x="30" y="30" width="30" height="2" rx="1" fill="#1a3a5c" opacity="0.3"/>
            <rect x="30" y="35" width="25" height="2" rx="1" fill="#1a3a5c" opacity="0.2"/>
            <rect x="30" y="40" width="28" height="2" rx="1" fill="#1a3a5c" opacity="0.2"/>
            <rect x="30" y="50" width="60" height="8" rx="2" fill="#1a3a5c" opacity="0.1"/>
          </svg>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon blue">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"/></svg>
          </div>
          <div class="stat-info">
            <span class="stat-num" id="t-total-students">0</span>
            <span class="stat-label">Total Students</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon gold">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5z" clip-rule="evenodd"/></svg>
          </div>
          <div class="stat-info">
            <span class="stat-num" id="t-total-assignments">0</span>
            <span class="stat-label">Active Assignments</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
          </div>
          <div class="stat-info">
            <span class="stat-num" id="t-pending-review">0</span>
            <span class="stat-label">Pending Review</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
          </div>
          <div class="stat-info">
            <span class="stat-num" id="t-graded">0</span>
            <span class="stat-label">Graded</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Recent Submissions</h3>
          <a href="#" class="card-link t-nav-link" data-panel="t-submissions">View all</a>
        </div>
        <div id="t-recent-submissions">
          </div>
      </div>

    </div>
  </div>

  <script src="date.js"></script>
</body>
</html>
