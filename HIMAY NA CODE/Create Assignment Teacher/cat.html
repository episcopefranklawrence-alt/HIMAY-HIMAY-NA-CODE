<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDUGRAM — Create Assignment Workspace</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="cat.css" />
</head>
<body>

  <div class="panel active" id="t-create">
    <div class="panel-content">
      <div class="section-header">
        <h2>Create New Assignment</h2>
      </div>
      <div class="create-form-wrap">
        <div class="card create-form-card">
          <div class="field-group">
            <label>Assignment Title *</label>
            <input type="text" id="new-assignment-title" placeholder="e.g. Research Paper on Climate Change" />
          </div>
          <div class="field-row">
            <div class="field-group">
              <label>Subject / Course</label>
              <input type="text" id="new-assignment-subject" placeholder="e.g. English Composition" />
            </div>
            <div class="field-group">
              <label>Due Date *</label>
              <input type="date" id="new-assignment-due" />
            </div>
          </div>
          <div class="field-row">
            <div class="field-group">
              <label>Minimum Word Count</label>
              <input type="number" id="new-assignment-words" placeholder="e.g. 800" min="50" />
            </div>
            <div class="field-group">
              <label>Assignment Type</label>
              <select id="new-assignment-type">
                <option value="essay">Essay</option>
                <option value="research">Research Paper</option>
                <option value="report">Book Report</option>
                <option value="reflection">Reflection</option>
                <option value="analysis">Critical Analysis</option>
              </select>
            </div>
          </div>
          <div class="field-group">
            <label>Assignment Description / Prompt *</label>
            <textarea id="new-assignment-desc" rows="5" placeholder="Write detailed instructions for students…"></textarea>
          </div>
          <div class="field-group">
            <label>Rubric / Grading Criteria</label>
            <textarea id="new-assignment-rubric" rows="4" placeholder="Describe grading criteria (optional)…"></textarea>
          </div>
          <div id="create-error" class="form-error hidden"></div>
          <div id="create-success" class="form-success hidden"></div>
          <div class="form-actions">
            <button class="btn-secondary" id="reset-assignment-btn">Reset</button>
            <button class="btn-primary" id="create-assignment-btn">Publish Assignment</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="cat.js"></script>
</body>
</html>
