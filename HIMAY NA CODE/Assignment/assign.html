<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDUGRAM — My Assignments Workspace</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="assign.css" />
</head>
<body>

  <div class="panel" id="s-assignments">
    <div class="panel-content">
      <div class="section-header">
        <h2>My Assignments</h2>
        <div class="filter-row">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="submitted">Submitted</button>
          <button class="filter-btn" data-filter="graded">Graded</button>
        </div>
      </div>
      <div class="assignment-grid" id="student-assignment-grid">
        </div>
    </div>
  </div>

  <script src="assign.js"></script>
</body>
</html>
