<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDUGRAM — Managed Assignments Workspace</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="mat.css" />
</head>
<body>

  <div class="panel active" id="t-assignments">
    <div class="panel-content">
      <div class="section-header">
        <h2>My Published Assignments</h2>
        <button class="btn-primary small t-nav-link" id="add-assignment-shortcut">+ New Assignment</button>
      </div>
      <div id="teacher-assignment-list">
        </div>
    </div>
  </div>

  <div id="edit-assignment-modal" class="modal hidden">
    <div class="modal-backdrop" id="edit-assignment-backdrop"></div>
    <div class="modal-box" style="max-width: 560px;">
      <div class="modal-header">
        <h3>Edit Assignment</h3>
        <button class="modal-close" id="edit-assignment-close">✕</button>
      </div>
      <div class="modal-body" style="display:flex; flex-direction:column; gap:1.1rem;">
        <div class="field-group">
          <label>Assignment Title *</label>
          <input type="text" id="edit-assignment-title" placeholder="e.g. Research Paper on Climate Change" />
        </div>
        <div class="field-row">
          <div class="field-group">
            <label>Open Date (Min. Date)</label>
            <input type="date" id="edit-assignment-open" />
          </div>
          <div class="field-group">
            <label>Due Date *</label>
            <input type="date" id="edit-assignment-due" />
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label>Minimum Word Count</label>
            <input type="number" id="edit-assignment-words" min="50" placeholder="e.g. 800" />
          </div>
          <div class="field-group">
            <label>Assignment Type</label>
            <select id="edit-assignment-type">
              <option value="essay">Essay</option>
              <option value="research">Research Paper</option>
              <option value="report">Book Report</option>
              <option value="reflection">Reflection</option>
              <option value="analysis">Critical Analysis</option>
            </select>
          </div>
        </div>
        <div id="edit-assignment-error" class="form-error hidden"></div>
        <div id="edit-assignment-success" class="form-success hidden"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="edit-assignment-cancel">Cancel</button>
        <button class="btn-primary" id="edit-assignment-save">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="mat.js"></script>
</body>
</html>
